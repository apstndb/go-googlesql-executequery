[tools]
# Track goccy/go-googlesql's go.mod requirement.
go = "1.26"
"go:google.golang.org/protobuf/cmd/protoc-gen-go" = "v1.36.5"
golangci-lint = "2.12.2"
protoc = "29.3"

[tasks.fmt]
description = "Format Go sources (golangci-lint fmt; gofumpt from .golangci.yml)"
run = "golangci-lint fmt ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.lint-fix]
description = "Run golangci-lint with --fix (local; CI uses lint without --fix)"
run = "golangci-lint run --fix ./..."

[tasks.test]
description = "Run unit tests"
run = "go test ./..."

[tasks."test:corpus"]
description = "Run corpus golden tests against third_party/googlesql/googlesql/examples"
run = "go test -tags=corpus ./cmd/execute_query/..."

[tasks."test:integration"]
description = "Chromedp headless tests for --web UI (requires Chrome/Chromium on PATH)"
run = "go test -tags=integration -count=1 -timeout=15m ./internal/webui/..."

[tasks.build]
description = "Build the execute_query binary"
run = "go build -o bin/execute_query ./cmd/execute_query"

[tasks.generate]
description = "Generate Go bindings for upstream protobufs"
run = """
protoc -I=third_party/googlesql \
  --go_out=. \
  --go_opt=module=github.com/apstndb/go-googlesql-executequery \
  --go_opt=Mgooglesql/public/options.proto=github.com/apstndb/go-googlesql-executequery/internal/optionspb \
  third_party/googlesql/googlesql/public/options.proto
"""

[tasks.ci]
description = "Full CI pipeline (test, build, then lint — ordered to warm the module/build cache before golangci-lint)"
run = "mise run generate && mise run test && mise run build && mise run lint"
